services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: FishyTodoAPI
      Jwt__Audience: FishyTodoClient
      Jwt__ExpirationMinutes: 15
      FishyFrontend__Origins: "http://localhost:8081"

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: /
        VITE_API_BASE_URL: http://localhost:8080
        VITE_APP_TITLE: FishyToDo
        VITE_DEMO_JWT_ROLE: ADMIN
    ports:
      - "8081:80"
    depends_on:
      - api
